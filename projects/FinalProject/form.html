        <main>
            <h2>Contact the Booth</h2>

            <p>
                Use this form if you want to ask about the photobooth business or leave a message.
                The form is simple and lets visitors send a quick request.
            </p>

            <form id="myForm" action="#" method="get">
                <fieldset>
                    <legend>Send a Message</legend>

                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name">
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="form-row">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-row">
                        <label for="copies">Number of Copies</label>
                        <input type="number" id="copies" name="copies" min="1" max="10">
                    </div>

                    <div class="form-row">
                        <label for="template">Template</label>
                        <select id="template" name="template">
                            <option value="">Choose one</option>
                            <option value="pink">Pink</option>
                            <option value="classic">Classic</option>
                            <option value="fun">Fun</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label for="comments">Comments</label>
                        <textarea id="comments" name="comments"></textarea>
                    </div>

                    <div class="form-row submit-row">
                        <label></label>
                        <input type="submit" value="Submit">
                    </div>
                </fieldset>
            </form>

            <p id="message"></p>
        </main>

        <footer>
